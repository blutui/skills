name: Build AGENTS.md Rule File

on:
  workflow_dispatch:
  push:
    branches:
      - main  

jobs:
  build-agents-rule-file:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build AGENTS.md
        run: |
          node .github/build-agents-md/build.js
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add AGENTS.md Claude.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update AGENTS.md and Claude.md" && git push)