name: Blutui Project Guidelines CI

on:
  push:
    branches: [main]
    paths:
      - "skills/blutui-project-guidelines/**"
      - "packages/blutui-project-guidelines-build/**"
  pull_request:
    branches: [main]
    paths:
      - "skills/blutui-project-guidelines/**"
      - "packages/blutui-project-guidelines-build/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/blutui-project-guidelines-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: packages/blutui-project-guidelines-build/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install

      - name: Validate Guidelines
        run: pnpm validate

      - name: Build Guidelines
        run: pnpm build
