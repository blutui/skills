name: Blutui Project Guidelines CI

on:
  push:
    branches: [main]
    paths:
      - 'skills/blutui-project-guidelines/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/blutui-project-guidelines/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install

      - name: Validate Guidelines
        run: pnpm validate

      - name: Build Guidelines
        run: pnpm build
